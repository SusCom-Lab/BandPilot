# Data paths
data:
  # H100 data for training/model inference (16M samples by default)
  h100_training_data_path: './Data/H100/Pune_H100_16M_binary.csv'
  # H100 data for real-data evaluation (2GB samples)
  h100_evaluation_data_path: './Data/H100/Pune_H100_2GB_binary.csv'
  bandwidth_dict_dir: './Data/Bandwidth'
  model_save_dir: './model'
  evaluation_dir: './Data/Evaluation/'

# Model parameters
model:
  type: 'full'
  hidden_dim: 32
  num_layers: 6
  num_heads: 8
  dropout: 0.05
  node_count_embedding_dim: 8

# Training parameters
training:
  enable_training: True  # false: skip training and load existing model ({model_save_dir}/{cluster_type}/bandwidth_predictor_ns{num_train_samples}.pth or simple_bandwidth_predictor_ns{num_train_samples}.pth)
  batch_size: 100
  num_epochs: 300
  learning_rate: 0.001
  weight_decay: 0.00001
  patience: 80
  lambda_ewc: 2.0
  num_train_samples: 250
  num_test_samples: 2500

# Cluster configuration
cluster:
  total_gpu: 32
  cluster_types:
    - 'H100_26H100_27H100_28H100_29'
    - 'Het-4Mix'
  bw_switch: 1111  # only used as a filename tag

# Evaluation configuration
evaluation:
  enable_single_contention: true  # true: run single_dispatch_with_contention experiments
  single_contention:          #---------------------
    repeat_num: 50
    if_dynamic: true
    contention_mode:
    - 'intensive'
    - 'common'
    - 'idle'
    search_if_real_data: false
  max_bw_offline:            #---------------------
    enable: True            # true: collect max_bw cache offline
    repeat_num: 50
    if_dynamic: true
    contention_mode:
    - 'intensive'
    - 'common'
    - 'idle'
    search_if_real_data: True
    local_top_k: 10
    max_combos_per_distribution: 2048
    max_total_combos: 200000
  
# Others
random_seed: 
  - 1111
device: 'cuda'

