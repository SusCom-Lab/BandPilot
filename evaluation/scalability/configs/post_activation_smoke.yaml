# Post-activation scalability smoke test.
#
# Run:
#   python main.py --config evaluation/scalability/configs/post_activation_smoke.yaml
#
# This config uses a small representative slice to validate the runtime
# adaptive post-activation path before launching a full benchmark.

# Data paths
data:
  h100_training_data_path: './Data/H100/Pune_H100_16M_binary.csv'
  h100_evaluation_data_path: './Data/H100/Pune_H100_2GB_binary.csv'
  bandwidth_dict_dir: './Data/Bandwidth'
  model_save_dir: './model'
  evaluation_dir: './Data/Evaluation/'

# Model parameters
model:
  type: 'full'
  hidden_dim: 32
  num_layers: 6
  num_heads: 8
  dropout: 0.05
  node_count_embedding_dim: 8

# Training parameters
training:
  # Smoke tests reuse existing model artifacts and only exercise evaluation.
  enable_training: false
  batch_size: 100
  num_epochs: 300
  learning_rate: 0.001
  weight_decay: 0.00001
  patience: 80
  lambda_ewc: 2.0
  num_train_samples: 250
  num_test_samples: 2500

# Cluster configuration
cluster:
  total_gpu: 32
  cluster_types:
    - 'H100_26H100_27H100_28H100_29'
  bw_switch: 1111

# Evaluation configuration
evaluation:
  enable_single_contention: false
  adaptive_threshold_policy:
    mode: 'homogeneity_split'
    homogeneous:
      cv_threshold: 0.10
      gap_threshold: 0.08
      min_candidates_for_cv: 4
    heterogeneous:
      cv_threshold: 0.10
      gap_threshold: 0.06
      min_candidates_for_cv: 4

  single_contention:
    repeat_num: 50
    if_dynamic: true
    contention_mode:
    - 'common'
    search_if_real_data: false

  max_bw_offline:
    enable: false
    repeat_num: 50
    if_dynamic: true
    contention_mode:
    - 'common'
    search_if_real_data: true
    local_top_k: 10
    max_combos_per_distribution: 2048
    max_total_combos: 200000

  sensitivity_analysis:
    enable: false
    sample_sizes: [25, 50, 75, 100, 150, 200, 250, 300, 400, 500]
    strategies: ['Random', 'Stratified', 'Worst-Case']
    num_seeds: 20
    master_seed: 42
    num_test_samples: 2500
    output_dir: './evaluation/sensitivity-analysis/artifacts/predictor-level'

  scalability_benchmark:
    enable: true
    output_dir: './evaluation/scalability/artifacts/benchmark/smoke/search_overhead_post_activation_smoke'
    log_level: 'INFO'
    clear_cache: true
    resume: false
    save_every_n_records: 1
    algorithms: ['EHA', 'PTS', 'BandPilot']
    hu_unit_gate:
      aggressive: false
    adaptive_runtime_policy:
      mode: 'online_knn'
      output_algorithm_label: 'BandPilot'
      fallback_backend_label: 'PTS'
      policy_name: 'adaptive_knn'
      top_k: 5
      bootstrap_draws: 256
      relative_noise_floor: 0.02
      bw_improvement_threshold_pct_of_bandpilot: 0.5
      k_neighbors: 5
      same_contention_only: true
      min_support: 5
      low_trust_conflict_risk_threshold: 0.30
      risk_threshold: 0.15

    public_view:
      public_algorithms: ['EHA', 'PTS', 'BandPilot']
      upper_bound_algorithm: null
      representative_contention_mode: 'common'
      representative_avail_ratio: 0.7
      representative_inter_pod_factor: 0.7
      representative_k_values: [16, 64]
      envelope_contention_modes: ['common']

    real_dispatch:
      # Use four k values to populate the runtime bank while keeping the smoke
      # run short enough for quick validation.
      k_values: [16, 20, 24, 28]
      contention_modes: ['common']
      repeat_num: 10
      algorithms: ['EHA', 'PTS', 'BandPilot']

    scaled_search:
      # Keep one representative scaled group; the public-slice logic still uses
      # repeat_num_public_slice=20 for report rendering.
      gpu_counts: [64]
      k_values: [16, 64]
      avail_ratios: [0.7]
      contention_modes: ['common']
      inter_pod_factors: [0.7]
      repeat_num: 10
      repeat_num_public_slice: 20
      algorithms: ['EHA', 'PTS', 'BandPilot']

    predictor_profile:
      inference_node_counts: [8, 64]
      inference_repeats: 10

    latency_synthesis:
      target_gpu_counts: [512]

# Others
random_seed:
  - 1111
device: 'cuda'
