# Two-GPU tensor-parallel bandwidth sidecar.
#
# Run:
#   python evaluation/llm_tp_bandwidth/runner.py --config evaluation/llm_tp_bandwidth/configs/default.yaml
#
# Override examples:
#   --gpu-pair 0,1 --bridge-type nvlink
#   --gpu-pair 0,2 --bridge-type pcie

experiment:
  output_dir: "./evaluation/llm_tp_bandwidth/artifacts"
  gpu_pair: [0, 1]
  bridge_type: "auto"
  model_choice: "auto"
  seq_len: 1024
  micro_batch_size: 1
  warmup_steps: 5
  measured_steps: 30
  profile_steps: 10
  learning_rate: 1.0e-5
  weight_decay: 0.01
  gradient_checkpointing: true

data:
  dataset_name: "wikitext"
  dataset_config_name: "wikitext-2-raw-v1"
  split: "train"
  cache_dir: "./evaluation/llm_tp_bandwidth/cache"
